<!-- add.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #eef2f7;
        }

        .form-box{
            background: white;
            padding: 35px;
            border-radius: 15px;
            margin-top: 60px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }

        h2{
            color: #0d6efd;
            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="form-box">

                <h2 class="text-center mb-4">
                    ➕ Add Student
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Student Name
                        </label>

                        <input type="text"
                               name="name"
                               class="form-control"
                               placeholder="Enter student name"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Roll Number
                        </label>

                        <input type="number"
                               name="roll"
                               class="form-control"
                               placeholder="Enter roll number"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Course
                        </label>

                        <input type="text"
                               name="course"
                               class="form-control"
                               placeholder="Enter course"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter email"
                               required>

                    </div>

                    <div class="d-grid">

                        <button type="submit"
                                class="btn btn-primary">

                            Save Student

                        </button>

                    </div>

                </form>

                <div class="text-center mt-3">

                    <a href="/" class="btn btn-secondary">
                        Back
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
